<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modulo Candidatura</title>
</head>
<body>

<h2>Modulo Candidatura</h2>

<form id="candidaturaForm">

<label>Discord ID *</label>
<input type="text" name="discordId" required>

<label>Fascia d'età *</label>
<select name="fasciaEta" required>
<option value="13-15">13-15</option>
<option value="15-17">15-17</option>
<option value="17-18">17-18</option>
<option value="18+">18+</option>
</select>

<h3>Cultura Generale (metti N/A se non sai)</h3>

<input type="text" name="roma" placeholder="Quando nacque Roma?" required>
<input type="text" name="muroBerlino" placeholder="Caduta muro Berlino?" required>
<input type="text" name="chimicaOrganica" placeholder="Chimica organica?" required>
<input type="text" name="chimicaBiologica" placeholder="Chimica biologica?" required>
<input type="text" name="maastricht" placeholder="Trattato Maastricht?" required>
<input type="text" name="lussemburgo" placeholder="Capitale Lussemburgo?" required>

<h3>Stesura Notizia</h3>
<textarea name="notizia" required></textarea>

<label>
<input type="checkbox" name="regole" required>
Rispetterai le regole?
</label>

<label>
<input type="checkbox" name="conferma" required>
Confermi invio?
</label>

<br><br>
<button type="submit">Invia</button>
</form>

<script>
document.getElementById("candidaturaForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const webhookURL = "https://ptb.discord.com/api/webhooks/1478036301340082228/ej7XTvfg_OumSiorMktE5GpadxQBroPNLtApTOwEijavSLCpATiz2ZFrbbDj_i9p5QkZ";

    const form = new FormData(this);

    const embed = {
        title: "📄 Nuova Candidatura",
        color: 3447003,
        fields: [
            { name: "Discord ID", value: form.get("discordId") },
            { name: "Fascia Età", value: form.get("fasciaEta") },
            { name: "Roma", value: form.get("roma") },
            { name: "Muro Berlino", value: form.get("muroBerlino") },
            { name: "Chimica Organica", value: form.get("chimicaOrganica") },
            { name: "Chimica Biologica", value: form.get("chimicaBiologica") },
            { name: "Trattato Maastricht", value: form.get("maastricht") },
            { name: "Capitale Lussemburgo", value: form.get("lussemburgo") },
            { name: "Notizia", value: form.get("notizia") }
        ],
        timestamp: new Date()
    };

    try {
        await fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                embeds: [embed]
            })
        });

        alert("✅ Candidatura inviata!");
        this.reset();

    } catch (err) {
        alert("❌ Errore invio candidatura");
    }
});
</script>

</body>
</html>
